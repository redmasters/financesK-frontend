<!-- src/app/components/spend-create/spend-create.component.html -->
<div class="container mt-4">
  <h2>Novo Gasto</h2>

  <form (ngSubmit)="onSubmit()" #spendForm="ngForm">
    <div class="mb-3">
      <label class="form-label">Nome *</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="formData.name"
        name="name"
        required
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Descrição</label>
      <textarea
        class="form-control"
        [(ngModel)]="formData.description"
        name="description"
      ></textarea>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Valor *</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="formData.amount"
          name="amount"
          step="0.01"
          required
        >
      </div>

      <div class="col-md-4 mb-3">
        <label class="form-label">Data de Vencimento</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="formData.dueDate"
          name="dueDate"
        >
      </div>

      <div class="col-md-4 mb-3">
        <label class="form-label">Categoria *</label>
        <select
          class="form-select"
          [(ngModel)]="formData.categoryId"
          name="categoryId"
          required
        >
          <option value="">Selecione...</option>
          <option
            *ngFor="let cat of categories"
            [value]="cat.id"
          >
            {{ cat.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [(ngModel)]="formData.isDue"
            name="isDue"
          >
          <label class="form-check-label">
            Está Vencido?
          </label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [(ngModel)]="formData.isPaid"
            name="isPaid"
          >
          <label class="form-check-label">
            Está Pago?
          </label>
        </div>

        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [(ngModel)]="formData.isRecurring"
            name="isRecurring"
          >
          <label class="form-check-label">
            Recorrente?
          </label>
        </div>
      </div>
    </div>

    <div *ngIf="error" class="alert alert-danger mb-3">{{ error }}</div>

    <button type="submit" class="btn btn-primary">
      Registrar Gasto
    </button>

    <button type="button" class="btn btn-secondary" (click)="onCancel()">
      Cancelar
    </button>
  </form>
</div>
