<!-- src/app/components/category-create/category-create.component.html -->
<div class="container mt-4">
  <h2>Nova Categoria</h2>

  <form (ngSubmit)="onSubmit()" #categoryForm="ngForm">
    <div class="mb-3">
      <label class="form-label">Nome *</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="name"
        name="name"
        required
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Descrição</label>
      <textarea
        class="form-control"
        [(ngModel)]="description"
        name="description"
      ></textarea>
    </div>

    <div *ngIf="error" class="alert alert-danger mb-3">{{ error }}</div>

    <button type="submit" class="btn btn-primary">
      Criar Categoria
    </button>
  </form>
</div>
