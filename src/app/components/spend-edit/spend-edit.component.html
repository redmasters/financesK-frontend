<div class="container mt-4">
  <h2>Editar Gasto</h2>

  <div *ngIf="loading" class="alert alert-info">Carregando...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form *ngIf="!loading && !error" (ngSubmit)="onSubmit()" #editForm="ngForm">
    <div class="row">
      <!-- Nome e Descrição -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Nome *</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="spend.name"
          name="name"
          required
        >
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Descrição</label>
        <textarea
          class="form-control"
          [(ngModel)]="spend.description"
          name="description"
          rows="1"
        ></textarea>
      </div>
    </div>

    <div class="row">
      <!-- Valor e Data -->
      <div class="col-md-3 mb-3">
        <label class="form-label">Valor *</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="spend.amount"
          name="amount"
          step="0.01"
          required
        >
      </div>

      <div class="col-md-3 mb-3">
        <label class="form-label">Data de Vencimento *</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="spend.dueDate"
          name="dueDate"
          required
        >
      </div>

      <!-- Categoria e Status -->
      <div class="col-md-3 mb-3">
        <label class="form-label">Categoria *</label>
        <select
          class="form-select"
          [(ngModel)]="spend.categoryId"
          name="categoryId"
          required
        >
          <option value="">Selecione...</option>
          <option
            *ngFor="let category of categories"
            [value]="category.id"
            [selected]="category.id === spend.categoryId"
          >
            {{ category.name }}
          </option>
        </select>
      </div>

      <div class="col-md-3 mb-3">
        <label class="form-label">Status *</label>
        <select
          class="form-select"
          [(ngModel)]="spend.status.id"
          name="statusId"
          required
        >
          <option value="">Selecione...</option>
          <option
            *ngFor="let status of statuses"
            [value]="status.id"
            [selected]="status.id === spend.status?.id"
          >
            {{ status.name }}
          </option>
        </select>
      </div>
    </div>

    <!-- Recorrente -->
    <div class="mb-3 form-check">
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="spend.isRecurring"
        name="isRecurring"
        id="isRecurring"
      >
      <label class="form-check-label" for="isRecurring">Gasto Recorrente</label>
    </div>
    <!-- Vencido -->
    <div class="mb-3 form-check">
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="spend.isDue"
        name="isDue"
        id="isDue"
      >
      <label class="form-check-label" for="isDue">Está Vencido?</label>
    </div>
    <!-- Pago -->
    <div class="mb-3 form-check">
      <input
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="spend.isPaid"
        name="isPaid"
        id="isPaid"
      >
      <label class="form-check-label" for="isPaid">Está Pago?</label>
    </div>

    <!-- Botões -->
    <div class="d-flex gap-2">
      <button
        type="submit"
        class="btn btn-primary"
      >
        Salvar Alterações
      </button>
      <button
        type="button"
        class="btn btn-secondary"
        (click)="onCancel()"
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
